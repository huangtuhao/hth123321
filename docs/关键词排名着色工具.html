<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关键词排名着色工具</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  h1 { text-align: center; font-size: 22px; color: #1d1d2e; margin-bottom: 24px; letter-spacing: .5px; }

  .upload-area {
    border: 2px dashed #4096ff;
    border-radius: 14px;
    padding: 44px 24px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: all .25s;
    margin-bottom: 18px;
    user-select: none;
  }
  .upload-area:hover, .upload-area.drag-over {
    background: #e6f4ff;
    border-color: #1677ff;
    box-shadow: 0 4px 18px rgba(22,119,255,.15);
  }
  .upload-area .u-icon { font-size: 50px; margin-bottom: 10px; }
  .upload-area .u-main { font-size: 16px; color: #444; font-weight: 500; }
  .upload-area .u-sub  { font-size: 13px; color: #aaa; margin-top: 6px; }
  #file-input { display: none; }

  .legend-card {
    background: white;
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.07);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .legend-title { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 10px; }
  .legend-item  { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #444; }
  .legend-swatch { width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; }

  .controls-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 15px;
  }
  .file-label { font-size: 14px; color: #666; flex-grow: 1; }
  .file-label span { font-weight: 600; color: #1677ff; }

  /* 新增 ASIN 输入框样式 */
  .asin-box {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .asin-label { font-size: 13px; font-weight: 600; color: #555; }
  .asin-input {
    padding: 8px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 8px;
    font-size: 13px;
    width: 180px;
    outline: none;
    transition: all .2s;
  }
  .asin-input:focus {
    border-color: #1677ff;
    box-shadow: 0 0 0 2px rgba(22,119,255,.2);
  }

  .export-btn {
    background: #1677ff;
    color: white;
    border: none;
    padding: 9px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all .2s;
  }
  .export-btn:hover:not(:disabled) {
    background: #0958d9;
    box-shadow: 0 2px 10px rgba(22,119,255,.35);
  }
  .export-btn:disabled { background: #d9d9d9; color: #aaa; cursor: not-allowed; }

  .table-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,.07);
  }
  .table-scroll { overflow-x: auto; max-height: 620px; overflow-y: auto; }

  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  thead th {
    background: #1d1d2e;
    color: white;
    padding: 11px 13px;
    text-align: left;
    white-space: nowrap;
    font-weight: 500;
    position: sticky;
    top: 0;
    z-index: 2;
    border-right: 1px solid rgba(255,255,255,.1);
  }
  thead th:last-child { border-right: none; }
  td {
    padding: 8px 13px;
    border-bottom: 1px solid #f0f0f0;
    white-space: nowrap;
  }
  tbody tr:hover td { filter: brightness(.95); }

  .link-cell a {
    color: #1677ff;
    text-decoration: none;
    font-weight: 500;
    padding: 2px 8px;
    border: 1px solid #1677ff;
    border-radius: 4px;
    font-size: 12px;
    transition: all .15s;
  }
  .link-cell a.index-link {
    color: #52c41a;
    border-color: #52c41a;
  }
  .link-cell a:hover {
    background: #1677ff;
    color: white;
  }
  .link-cell a.index-link:hover {
    background: #52c41a;
    color: white;
  }

  .stats-bar {
    padding: 10px 16px;
    border-top: 1px solid #f0f0f0;
    font-size: 12px;
    color: #888;
    background: #fafafa;
    display: none;
    line-height: 1.8;
  }
  .stats-note { color: #fa8c16; font-weight: 500; }

  .placeholder { text-align: center; padding: 80px 20px; color: #bbb; }
  .placeholder .p-icon { font-size: 50px; margin-bottom: 12px; }
  .placeholder .p-text { font-size: 15px; }
</style>
</head>
<body>
<div class="container">

  <h1>📊 关键词排名着色工具</h1>

  <div class="upload-area" id="upload-area" onclick="triggerInput()">
    <div class="u-icon">📂</div>
    <div class="u-main">点击或拖拽上传 Excel 文件</div>
    <div class="u-sub">支持 .xlsx / .xls · 仅本地处理，不上传服务器 · 默认读取第一个 Sheet</div>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls">

  <div class="legend-card">
    <div class="legend-title">关键词排名 档位颜色：</div>
    <div class="legend-items" id="legend-items"></div>
  </div>

  <div class="controls-bar">
    <div class="file-label" id="file-label">尚未加载文件</div>
    
    <div class="asin-box">
      <span class="asin-label">产品 ASIN:</span>
      <input type="text" id="asin-input" class="asin-input" placeholder="输入 ASIN 查收录 (选填)">
    </div>

    <button class="export-btn" id="export-btn" disabled onclick="exportFile()">⬇ 导出着色表格（.xls）</button>
  </div>

  <div class="table-card">
    <div class="table-scroll" id="table-scroll">
      <div class="placeholder">
        <div class="p-icon">📄</div>
        <div class="p-text">上传 Excel 文件后，表格将在此处显示</div>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
  </div>

</div>
<script>
// ── Tier definitions ──────────────────────────
const TIERS = [
  { label: '0 – 1万',         max: 10000,    bg: '#006400', color: '#fff' },
  { label: '1万 – 5万',       max: 50000,    bg: '#52c41a', color: '#fff' },
  { label: '5万 – 10万',      max: 100000,   bg: '#fadb14', color: '#333' },
  { label: '10万 – 20万',     max: 200000,   bg: '#fa8c16', color: '#fff' },
  { label: '20万 – 40万',     max: 400000,   bg: '#f5222d', color: '#fff' },
  { label: '40万以上 / 空值', max: Infinity, bg: '#531dab', color: '#fff' },
];

function getTier(val) {
  if (val === null || val === undefined || val === '') return TIERS[5];
  const n = Number(val);
  if (isNaN(n)) return TIERS[5];
  for (let i = 0; i < TIERS.length; i++) {
    if (n < TIERS[i].max) return TIERS[i];
  }
  return TIERS[5];
}

function buildAmazonUrl(keyword) {
  const k = String(keyword || '').trim();
  if (!k) return 'https://www.amazon.com/s?k=';
  return 'https://www.amazon.com/s?k=' + encodeURIComponent(k).replace(/%20/g, '+');
}

// 新增：构建收录查询 URL (关键词 + ASIN)
function buildIndexUrl(keyword, asin) {
  const k = String(keyword || '').trim();
  const a = String(asin || '').trim();
  if (!k && !a) return 'https://www.amazon.com/s?k=';
  const query = [k, a].filter(Boolean).join(' + ');
  return 'https://www.amazon.com/s?k=' + encodeURIComponent(query).replace(/%20/g, '+');
}

// ── State ─────────────────────────────────────
let parsedData       = null;  // { origHeaders, rows }
let kwColIndex       = -1;    // keyword column index in original data
let rankColIndex     = -1;    // rank column index in original data
let currentBase      = 'output';

const PREVIEW_LIMIT  = 100;
const LINK_COL_HDR   = '搜索链接';
const INDEX_COL_HDR  = '收录查询链接'; // 新增列名

// 监听 ASIN 输入框变化，实时更新表格
document.getElementById('asin-input').addEventListener('input', () => {
  if (parsedData) renderTable();
});

// ── Init legend ───────────────────────────────
(function initLegend() {
  const wrap = document.getElementById('legend-items');
  TIERS.forEach(t => {
    const border = t.bg === '#fadb14' ? 'border:1px solid #cdb900;' : '';
    wrap.insertAdjacentHTML('beforeend', `
      <div class="legend-item">
        <div class="legend-swatch" style="background:${t.bg};${border}"></div>
        <span>${t.label}</span>
      </div>`);
  });
})();

// ── Upload ────────────────────────────────────
function triggerInput() { document.getElementById('file-input').click(); }

const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover',  e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
  e.target.value = '';
});

function processFile(file) {
  currentBase = file.name.replace(/\.[^.]+$/, '');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb  = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      if (!raw || raw.length < 2) { showError('文件内容为空，请检查表格'); return; }

      const origHeaders = raw[0].map(String);
      const rows        = raw.slice(1);

      kwColIndex = origHeaders.findIndex(h => h.includes('关键词'));
      if (kwColIndex === -1) kwColIndex = 0; 

      rankColIndex = origHeaders.findIndex(h => h.includes('关键词排名'));
      if (rankColIndex === -1) {
        showError('未找到包含「关键词排名」的列，请确认表头名称是否正确');
        return;
      }

      parsedData = { origHeaders, rows };
      renderTable();

      document.getElementById('file-label').innerHTML = `已加载：<span>${file.name}</span>`;
      document.getElementById('export-btn').disabled = false;
      uploadArea.querySelector('.u-main').textContent = '重新上传文件';
      uploadArea.querySelector('.u-sub').textContent  = file.name;
    } catch(err) {
      showError('文件解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showError(msg) {
  document.getElementById('table-scroll').innerHTML = `
    <div class="placeholder">
      <div class="p-icon">⚠️</div>
      <div class="p-text" style="color:#f5222d;">${msg}</div>
    </div>`;
}

// ── Build display headers (insert 2 link cols after kwCol) ──
function getDisplayHeaders() {
  const h = [...parsedData.origHeaders];
  h.splice(kwColIndex + 1, 0, LINK_COL_HDR, INDEX_COL_HDR);
  return h;
}

// Map display-column-index → original-column-index
function origIdx(dispIdx) {
  const linkPos = kwColIndex + 1;
  const indexPos = kwColIndex + 2;
  if (dispIdx === linkPos || dispIdx === indexPos) return -1; // generated columns
  return dispIdx < linkPos ? dispIdx : dispIdx - 2; // offset by 2 now
}

// ── Render table (preview only) ───────────────
function renderTable() {
  const { origHeaders, rows } = parsedData;
  const displayHeaders = getDisplayHeaders();
  const previewRows    = rows.slice(0, PREVIEW_LIMIT);
  const linkPos        = kwColIndex + 1; 
  const indexPos       = kwColIndex + 2; 
  const asinVal        = document.getElementById('asin-input').value.trim();

  let html = '<table><thead><tr>';
  displayHeaders.forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += '</tr></thead><tbody>';

  previewRows.forEach(row => {
    html += '<tr>';
    displayHeaders.forEach((_, di) => {
      if (di === linkPos) {
        // 第一列：搜索链接
        const kw  = row[kwColIndex] ?? '';
        const url = buildAmazonUrl(kw);
        html += `<td class="link-cell"><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">搜索</a></td>`;
      } else if (di === indexPos) {
        // 第二列：收录查询链接 (带ASIN)
        const kw  = row[kwColIndex] ?? '';
        const url = buildIndexUrl(kw, asinVal);
        html += `<td class="link-cell"><a href="${esc(url)}" class="index-link" target="_blank" rel="noopener noreferrer">查收录</a></td>`;
      } else {
        const oi  = origIdx(di);
        const val = row[oi] ?? '';
        if (oi === rankColIndex) {
          const tier = getTier(val);
          html += `<td style="background:${tier.bg};color:${tier.color};font-weight:600;">${esc(String(val))}</td>`;
        } else {
          html += `<td>${esc(String(val))}</td>`;
        }
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('table-scroll').innerHTML = html;

  // Stats
  const allCounts = Array(TIERS.length).fill(0);
  rows.forEach(row => {
    const tier = getTier(row[rankColIndex] ?? '');
    allCounts[TIERS.indexOf(tier)]++;
  });

  const statsBar  = document.getElementById('stats-bar');
  const noteHtml  = rows.length > PREVIEW_LIMIT
    ? ` <span class="stats-note">（页面仅展示前 ${PREVIEW_LIMIT} 条，导出文件包含全部 ${rows.length} 条）</span>`
    : '';
  const summary   = TIERS.map((t, i) => `${t.label}：${allCounts[i]} 条`).join(' | ');
  statsBar.innerHTML = `共 ${rows.length} 条数据${noteHtml}<br>${summary}`;
  statsBar.style.display = 'block';
}

// ── Export (.xls with clickable links) ────────
function exportFile() {
  if (!parsedData) return;
  const { rows } = parsedData;
  const displayHeaders = getDisplayHeaders();
  const linkPos        = kwColIndex + 1;
  const indexPos       = kwColIndex + 2;
  const asinVal        = document.getElementById('asin-input').value.trim();

  let html = '\uFEFF' + `<html xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:x="urn:schemas-microsoft-com:office:excel"
xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<style>
table{border-collapse:collapse;}
th,td{font-family:Arial,"微软雅黑",sans-serif;font-size:11pt;border:1px solid #cccccc;padding:5px 10px;}
th{background:#1d1d2e;color:white;font-weight:bold;}
a{color:#1677ff;text-decoration:none;}
.index-link {color:#52c41a;}
</style>
</head><body><table>`;

  html += '<thead><tr>';
  displayHeaders.forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += '</tr></thead><tbody>';

  rows.forEach(row => {
    html += '<tr>';
    displayHeaders.forEach((_, di) => {
      if (di === linkPos) {
        const kw  = row[kwColIndex] ?? '';
        const url = buildAmazonUrl(kw);
        html += `<td><a href="${esc(url)}">搜索</a></td>`;
      } else if (di === indexPos) {
        const kw  = row[kwColIndex] ?? '';
        const url = buildIndexUrl(kw, asinVal);
        html += `<td><a href="${esc(url)}" class="index-link">查收录</a></td>`;
      } else {
        const oi  = origIdx(di);
        const val = row[oi] ?? '';
        if (oi === rankColIndex) {
          const tier = getTier(val);
          html += `<td style="background-color:${tier.bg};color:${tier.color};font-weight:bold;">${esc(String(val))}</td>`;
        } else {
          html += `<td>${esc(String(val))}</td>`;
        }
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></body></html>';

  const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${currentBase}_着色及收录版.xls`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

// ── Utils ─────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
