<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卖家精灵自动化提取工具 (批量增强版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .upload-area {
            border: 2px dashed #3498db;
            padding: 40px 20px;
            border-radius: 8px;
            background-color: #f7fbff;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .upload-area:hover {
            background-color: #eaf4fc;
            border-color: #2980b9;
        }
        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-text {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            pointer-events: none;
        }
        .upload-subtext {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 10px;
            pointer-events: none;
        }
        .tips {
            font-size: 14px;
            color: #555;
            text-align: left;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #333;
            text-align: left;
            background: #fafafa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-line;
            word-break: break-all;
            display: none;
        }
        .success-text { color: #27ae60; font-weight: bold; }
        .error-text { color: #e74c3c; font-weight: bold; }
        .info-text { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 自动化批量处理工具</h2>
    
    <div class="tips">
        <b>🤖 智能模式 (支持批量框选/拖拽多份文件)：</b><br>
        1. <b>Search(</b> 或 <b>AI-Competitor</b> 开头：提取 ASIN、商品标题、产品卖点，自动重命名。<br>
        2. <b>多ASIN对比结果</b> 开头：保留到“周平均搜索量”列，最多截取 150 行。
    </div>

    <div class="upload-area">
        <div class="upload-text">点击或批量拖拽文件到这里</div>
        <div class="upload-subtext">支持多选 .xlsx / .csv （选定后全部自动处理并下载）</div>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" multiple onchange="processFiles()">
    </div>
    
    <div id="status"></div>
</div>

<script>
    async function processFiles() {
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        const files = fileInput.files;

        if (!files.length) return;

        statusDiv.style.display = 'block';
        statusDiv.innerHTML = `<span class="info-text">🚀 开始处理，共检测到 ${files.length} 个文件...</span><br><br>`;

        for (let i = 0; i < files.length; i++) {
            statusDiv.innerHTML += `⏳ 正在处理 (${i+1}/${files.length}): ${files[i].name}...<br>`;
            statusDiv.scrollTop = statusDiv.scrollHeight; 

            await processSingleFile(files[i], statusDiv);
            
            await new Promise(resolve => setTimeout(resolve, 500)); 
        }

        statusDiv.innerHTML += `<br><span class="success-text">🎉 全部 ${files.length} 个文件处理并下载完成！</span>`;
        statusDiv.scrollTop = statusDiv.scrollHeight; 
        
        fileInput.value = ""; 
    }

    function processSingleFile(file, statusDiv) {
        return new Promise((resolve) => {
            const originalName = file.name;
            const lastDotIndex = originalName.lastIndexOf('.');
            const nameWithoutExt = lastDotIndex !== -1 ? originalName.substring(0, lastDotIndex) : originalName;

            let mode = "Unknown";
            let newFileName = "";

            // 1. 判断处理模式及生成文件名
            if (nameWithoutExt.match(/^Search\(/i)) {
                mode = "Search";
                const searchMatch = nameWithoutExt.match(/^Search\((.*)/i);
                if (searchMatch && searchMatch[1]) {
                    let insideParams = searchMatch[1];
                    if (insideParams.endsWith(')')) insideParams = insideParams.slice(0, -1);
                    const asins = insideParams.split(',');
                    const firstTwo = asins.slice(0, 2).join(',');
                    newFileName = `Search(${firstTwo}).xlsx`;
                } else {
                    newFileName = `${nameWithoutExt}_Output.xlsx`;
                }
            } 
            // 新增：识别 AI-Competitor 文件
            else if (nameWithoutExt.match(/^AI-Competitor/i)) {
                mode = "Search"; // 同样走只取3列的模式
                // 尝试提取其中的 10位 ASIN (例如: AI-Competitor-US-B0GTM82W1J-20260614)
                const aiMatch = nameWithoutExt.match(/AI-Competitor-[A-Za-z]+-([A-Z0-9]{10})/i);
                if (aiMatch && aiMatch[1]) {
                    newFileName = `Search(${aiMatch[1]}).xlsx`; // 统一改为 Search(ASIN).xlsx 格式
                } else {
                    newFileName = `${nameWithoutExt}_Output.xlsx`;
                }
            }
            else if (nameWithoutExt.startsWith("多ASIN对比结果")) {
                mode = "Compare";
                newFileName = `${nameWithoutExt}_Output.xlsx`;
            } else {
                mode = "Default";
                newFileName = `${nameWithoutExt}_Output.xlsx`;
            }

            // 2. 读取并解析文件
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    let targetData = null;

                    for (let sheetName of workbook.SheetNames) {
                        const sheet = workbook.Sheets[sheetName];
                        const rawData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
                        
                        if (rawData.length > 0) {
                            const normalizedData = rawData.map(row => {
                                let newRow = {};
                                for (let key in row) {
                                    newRow[key.trim()] = row[key];
                                }
                                return newRow;
                            });

                            const headers = Object.keys(normalizedData[0]);
                            if (mode === "Search" && (headers.includes("ASIN") || headers.includes("商品标题"))) {
                                targetData = normalizedData; break;
                            } else if (mode === "Compare" && headers.find(h => h.includes("竞争难度档位"))) {
                                targetData = normalizedData; break;
                            } else if (mode === "Default") {
                                targetData = normalizedData; break; 
                            }
                        }
                    }

                    if (!targetData) {
                        statusDiv.innerHTML += `<span class="error-text">❌ 失败: 未能在文件中找到匹配的数据列。</span><br>`;
                        resolve();
                        return;
                    }

                    let extractedData = [];

                    // 3. 根据模式提取数据
                    if (mode === "Search") {
                        extractedData = targetData.map(row => ({
                            "ASIN": row["ASIN"] || "",
                            "商品标题": row["商品标题"] || "",
                            "产品卖点": row["产品卖点"] || ""
                        })).filter(row => row["ASIN"] !== "" || row["商品标题"] !== "");
                    } 
                    else if (mode === "Compare") {
                        const allKeys = Object.keys(targetData[0]);
                        const cutOffIndex = allKeys.findIndex(k => k.includes("周平均搜索量"));
                        
                        let targetKeys = allKeys;
                        if (cutOffIndex !== -1) {
                            targetKeys = allKeys.slice(0, cutOffIndex + 1); 
                        }

                        extractedData = targetData.map(row => {
                            let newRow = {};
                            targetKeys.forEach(k => {
                                newRow[k] = row[k];
                            });
                            return newRow;
                        }).slice(0, 150); 
                    } 
                    else {
                        extractedData = targetData;
                    }

                    if (extractedData.length === 0) {
                        statusDiv.innerHTML += `<span class="error-text">❌ 失败: 提取出的内容为空。</span><br>`;
                        resolve();
                        return;
                    }

                    // 4. 生成新文件并下载
                    const newWorksheet = XLSX.utils.json_to_sheet(extractedData);
                    const newWorkbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "提取数据");

                    XLSX.writeFile(newWorkbook, newFileName);

                    statusDiv.innerHTML += `<span class="success-text">✅ 成功: 提取 ${extractedData.length} 行，已下载 ${newFileName}</span><br>`;
                    resolve();

                } catch (error) {
                    console.error(error);
                    statusDiv.innerHTML += `<span class="error-text">❌ 失败: 文件处理出错或损坏。</span><br>`;
                    resolve();
                }
            };

            reader.onerror = function() {
                statusDiv.innerHTML += `<span class="error-text">❌ 读取文件失败。</span><br>`;
                resolve();
            }

            reader.readAsArrayBuffer(file);
        });
    }
</script>

</body>
</html>
